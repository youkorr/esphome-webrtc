# =============================================================================
#  coturn — serveur TURN/STUN pour les appels WebRTC ESP32-P4 <-> ESP32-P4
#  À placer dans : /mnt/cache/appdata/coturn/turnserver.conf  (Unraid)
#  Le conteneur tourne en br0 avec l'IP LAN 192.168.1.12.
# =============================================================================

# --- Ports d'écoute TURN/STUN ---
listening-port=3478
tls-listening-port=5349

# --- Plage de ports RELAIS ---
# Petite plage volontairement : plus simple à rediriger sur la Livebox pour
# l'usage Internet. Doit rester dans le mapping Unraid (49152:65535).
# Suffisant pour plusieurs appels simultanés.
min-port=49152
max-port=49200

# --- Authentification long-terme (identifiant / mot de passe) ---
# Le P4 s'authentifie avec ces identifiants (voir le YAML ice_servers).
lt-cred-mech
realm=esphome.local
user=esp32:esp32pass

# --- Interfaces ---
listening-ip=0.0.0.0

# =============================================================================
#  USAGE INTERNET (maison-à-maison) — À ACTIVER PLUS TARD
#  1) Décommente external-ip et mets ton IP publique (vue dans les logs :
#     86.206.231.111) suivie de l'IP LAN du serveur.
#  2) Sur la Livebox, redirige vers 192.168.1.12 :
#       - 3478  TCP + UDP
#       - 49152-49200 UDP  (la plage relais ci-dessus)
# =============================================================================
# external-ip=86.206.231.111/192.168.1.12

# --- Simplicité : pas de TLS pour démarrer (certificats ajoutés plus tard) ---
no-tls
no-dtls

# --- Divers ---
verbose            # logs détaillés : on voit le P4 demander une allocation relais
fingerprint
no-multicast-peers
