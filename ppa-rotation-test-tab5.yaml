# ============================================================================
# ESP-Video Core (M5Stack Tab5 style)
# ============================================================================  
esp_video:
  i2c_id: bsp_bus
  xclk_pin: GPIO36
  xclk_freq: 24000000
  enable_jpeg: true
  enable_isp: true
  use_heap_allocator: false

# ============================================================================
# CamĆ©ra MIPI-CSI 
# ============================================================================



esp_cam_sensor:
  id: tab5_cam
  i2c_id: bsp_bus
  sensor_type: sc2356        #"sensor_type" au lieu de "sensor"
  resolution: "1280x720"           # , 1024x600 ,"800x600" 
  pixel_format: "RGB565"      # Zero-copy 
  framerate: 30
  jpeg_quality: 15
  mirror_x: false    # Flip horizontal (hardware)
  mirror_y: false    # Flip vertical
  rotation: 0         # 0/90/180/270Ā°
  crop_offset_x: 0   # Crop pixels from left
  ppa_enabled: false    # PPA

      
