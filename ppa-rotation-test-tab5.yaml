# ========== PAGE CAMERA ==========
    - id: camera_page
      bg_color: color_slate_blue_gray # Fond noir comme sur la photo
      on_load:
        - lambda: |-
            ESP_LOGI("camera", "Camera page loaded");
            static bool canvas_configured = false;
            if (!canvas_configured) {
              auto canvas = id(camera_canvas);
              if (canvas != nullptr) {
                id(camera_display).configure_canvas(canvas);
                canvas_configured = true;
                ESP_LOGI("lvgl", "ā Canvas configured");
              }
            }

      widgets:
        # ===== CANVAS CAMERA (rĆ©solution native sans bordure) =====
        - canvas:
            id: camera_canvas
            width: 1100 #480 1280x720
            height: 700  #390  # RĆ©solution native de la camĆ©ra
            x: 0       
            y: 0         # En haut
            bg_color: 0x4682B4
            border_width: 0
            radius: 0
            pad_all: 0


        # ===== BOUTONS DIRECTEMENT SUR LA PAGE =====
        
        # Bouton START (vert)
        - button:
            id: btn_start_streaming
            width: 120
            height: 80
            x: 1120
            y: 150
            bg_color: 0x00CC44
            bg_opa: COVER
            radius: 10
            on_click:
     
                - switch.turn_on: lvgl_display_enable_switch
                - lambda: |-
                    ESP_LOGI("camera", "ā¶ DĆ©marrage streaming");
                    if (id(tab5_cam).start_streaming()) {
                      ESP_LOGI("camera", "ā Streaming dĆ©marrĆ©");
                      lv_obj_set_style_bg_color(id(camera_canvas), lv_color_hex(0x000000), 0);
                    } else {
                      ESP_LOGE("camera", "ā Ćchec streaming");
                    }
            widgets:
              - label:
                  text_font: font_device_name
                  text: "START"
                  text_color: 0xFFFFFF
                  text_align: CENTER
                  align: CENTER

        # Bouton STOP (rouge)
        - button:
            id: btn_stop_streaming
            width: 120
            height: 80
            x: 1120
            y: 270
            bg_color: 0xFF4444
            bg_opa: COVER
            radius: 10
            on_click:
              then:
                - lambda: |-
                    ESP_LOGI("camera", "ā  ArrĆŖt streaming");
                    id(tab5_cam).stop_streaming();
                    lv_obj_set_style_bg_color(id(camera_canvas), lv_color_hex(0x4682B4), 0);
            widgets:
              - label:
                  text: "STOP"
                  text_color: 0xFFFFFF
                  text_font: font_device_name
                  text_align: CENTER
                  align: CENTER


        # Bouton BACK (rouge)
        - button:
            id: btn_camera_back
            width: 120
            height: 80
            x: 1120
            y: 400
            bg_color: 0xFF4444
            bg_opa: COVER
            radius: 10
            on_click:
              then:
                - switch.turn_off: lvgl_display_enable_switch
                - lambda: |-
                    ESP_LOGI("camera", "Retour accueil");
                    id(tab5_cam).stop_streaming();
                - lvgl.page.show: page_test
            widgets:
              - label:
                  text: "BACK"
                  text_color: 0xFFFFFF
                  text_font: font_device_name
                  text_align: CENTER
                  align: CENTER         

      on_swipe_up:
        - lambda: 'lv_indev_wait_release(lv_indev_get_act());'
        - lvgl.page.show: page_test
        - light.turn_on: 
            id: backlight
            flash_length: 50ms 
            


            