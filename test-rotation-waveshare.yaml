    id: arrow
    resize: 240x240
    type: RGB565
touchscreen:
  - platform: gt911
    id: touch
    i2c_id: bsp_bus
    reset_pin: GPIO23
    update_interval: 8ms   # polling (pas d'interruption)
    on_touch:
      - lambda: |-
          ESP_LOGD("touchscreen", "Touch detected at (%d, %d)", touch.x, touch.y);
      - light.turn_on: backlight 
               
    transform:
      swap_xy: false
      mirror_x: true
      mirror_y: true

display:
  - platform: mipi_dsi
    id: main_display
    show_test_card: false
    model: CUSTOM
    #rotation: 180
    update_interval: never
    auto_clear_enabled: false
    hsync_back_porch: 160
    lane_bit_rate: 1000Mbps
    color_order: rgb
    #pixel_mode: 24
    lanes: 2
    reset_pin:
      number: 33
    hsync_pulse_width: 70
    hsync_front_porch: 160
    vsync_back_porch: 23
    vsync_pulse_width: 1
    vsync_front_porch: 12
    pclk_frequency: 51MHz
    framebuffers: 2
    dimensions:
      width: 1024
      height: 600     
    init_sequence:   
      - [0xB2, 0x10]
      - [0x80, 0x8B]
      - [0x81, 0x78]
      - [0x82, 0x84]
      - [0x83, 0x88]
      - [0x84, 0xA8]
      - [0x85, 0xE3]
      - [0x86, 0x88]
      - [0x11, 0x00]
      - delay 120ms
      - [0x29]    

