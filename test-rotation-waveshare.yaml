update:
  - platform: esp32_hosted
    id: c6_firmware_update
    name: "ESP32-C6 Firmware"
    type: http
    source: https://esphome.github.io/esp-hosted-firmware/manifest/esp32c6.json
    update_interval: 6h
    
http_request:
  
esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  use_psram: true
  slot: 1


esp_video:
  i2c_id: bsp_bus
  xclk_pin: GPIO36
  xclk_freq: 24000000
  enable_jpeg: true
  enable_isp: true
  use_heap_allocator: false

esp_cam_sensor:
  id: tab5_cam
  i2c_id: bsp_bus
  sensor_type: ov5647        #"sensor_type" au lieu de "sensor"
  resolution: "800x800"          #"1920x1080"  #"800x800"   #"1280x960"    #"800x640"          # , 1024x600 ,vga
  framerate: 30
  #jpeg_quality: 15
  mirror_x: false    # Flip horizontal (hardware)
  mirror_y: false      # Flip vertical
  rotation: 0         # 0/90/180/270Â°
  crop_offset_x: 0     # Crop pixels from left

lvgl_camera_display:
  id: camera_display
  camera_id: tab5_cam
  canvas_id: camera_canvas
  update_interval: 30ms 

switch:
  - platform: template
    name: "LVGL Camera Display"
    id: lvgl_display_enable_switch
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      - lambda: |-
          auto *lvgl_disp = id(camera_display);  
          if (lvgl_disp != nullptr) {
            lvgl_disp->set_enabled(true);
          }
    turn_off_action:
      - lambda: |-
          auto *lvgl_disp = id(camera_display);  
          if (lvgl_disp != nullptr) {
            lvgl_disp->set_enabled(false);
          }
  - platform: ip_camera_viewer
    id: cam
    camera_id: security_cam_1
    restore_mode: ALWAYS_OFF      # PAS ALWAYS_ON   
i2c:
  - id: bsp_bus
    sda: GPIO07
    scl: GPIO08
    frequency: 400kHz 

esp_ldo:
  - voltage: 2.5V
    channel: 3          # LDO du PHY MIPI-DSI (P4)

output:
  - platform: ledc
    pin: GPIO32
    id: backlight_pwm
    frequency: 1000Hz
    inverted: true
    
color:
  - id: color_sky_blue
    hex: 3FA7F3
  - id: color_slate_blue_gray
    hex: 343645
  - id: color_steel_blue
    hex: 606682
  - id: color_misty_blue
