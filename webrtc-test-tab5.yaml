## ===========================================================================
##  WEBRTC — réglage TEST TÉLÉPHONE (navigateur)
## ===========================================================================
webrtc:
  id: rtc
  room_id: "${room}"
  # --- Test téléphone / navigateur (par défaut) ---
  video_codec: mjpeg
  audio_codec: opus
  # send_only : on N'AFFICHE PAS la vidéo du navigateur (edge264 sur flux WebRTC
  # avec pertes = crash). Tu envoies ta caméra au tél + audio 2 sens = STABLE.
  # Passe à sendrecv UNIQUEMENT en P4<->P4 (MJPEG), pas avec un navigateur.
  video_direction: sendrecv
  # --- === P4<->P4 === (décommente ces 3 lignes ET commente les 3 du dessus) ---
  # video_codec: mjpeg
  # audio_codec: opus
  # video_direction: sendrecv
  camera_id: tab5_cam
  speaker_id: tab5_speaker
  microphone_id: tab5_microphone
  sample_rate: 16000
  video_width: 640
  video_height: 480
  fps: 15
  auto_start: false
  ice_servers:
    - url: "stun:stun.l.google.com:19302"
    - url: "turn:openrelay.metered.ca:80"
      username: "openrelayproject"
      password: "openrelayproject"
  on_paired:
    - lvgl.label.update:
        id: call_status
        text: "● Appairé…"
        text_color: ${col_amber}
  on_connected:
    - lvgl.label.update:
        id: call_status
        text: "● Connecté"
        text_color: ${col_green}
    - lvgl.widget.hide: remote_hint
  on_disconnected:
    - lvgl.label.update:
        id: call_status
        text: "● Terminé"
        text_color: ${col_text2}
    - lvgl.widget.show: remote_hint
  on_connect_failed:
    - lvgl.label.update:
        id: call_status
        text: "● Échec connexion"
        text_color: ${col_red}
    - lvgl.widget.show: remote_hint  
# --- Bring-up écran Tab5 ---
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

esp_ldo:
  - voltage: 2.5V
    channel: 3   
# Boutons Home Assistant (doublon pratique des boutons à l'écran)
button:
  - platform: template
    name: "Appeler"
    on_press:
      - webrtc.start: rtc
      - switch.turn_on: lvgl_display_enable_switch
  - platform: template
    name: "Raccrocher"
    on_press:
      - webrtc.stop: rtc
      - switch.turn_off: lvgl_display_enable_switch
# ============================================================================
# AUDIO FULL-DUPLEX — notre composant fdaudio (Espressif natif)
# ============================================================================
fdaudio:
  id: audio_engine
  lrclk_pin: GPIO29
  bclk_pin: GPIO27
  mclk_pin: GPIO30
  din_pin: GPIO28
  dout_pin: GPIO26
  i2c_port: 0
  output_codec: es8388
  output_address: 0x10
  mic_address: 0x40
  mic_gain_db: 37.5
  output_volume: 70
  sample_rate: 16000
  enable_aec: true            # AEC -> micro nettoyé (rend le barge-in fiable)

microphone:
  - platform: fdaudio
    id: tab5_microphone
    fdaudio_id: audio_engine

speaker:
  - platform: fdaudio
    id: tab5_speaker
    fdaudio_id: audio_engine

audio_dac:
  - platform: es8388
    id: es8388_dac

media_player:
  - platform: speaker
    name: "Habbit Desk PRO"
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1    
# ============================================================================
# ESP-Video Core (M5Stack Tab5 style)
# ============================================================================  
esp_video:
  i2c_id: bsp_bus
  xclk_pin: GPIO36
  xclk_freq: 24000000
  enable_jpeg: true
  enable_isp: true
  use_heap_allocator: false

# ============================================================================
# Caméra MIPI-CSI 
# ============================================================================



esp_cam_sensor:
  id: tab5_cam
  i2c_id: bsp_bus
  sensor_type: sc2356        #"sensor_type" au lieu de "sensor"
  resolution: "1280x720"           # , 1024x600 ,"800x600" 
  pixel_format: "RGB565"      # Zero-copy 
  framerate: 30
  jpeg_quality: 15
  mirror_x: false    # Flip horizontal (hardware)
  mirror_y: false    # Flip vertical
  rotation: 0         # 0/90/180/270°
  crop_offset_x: 0   # Crop pixels from left
  ppa_enabled: false    # PPA

      
# ============================================================================
# Display LVGL avec caméra
# ============================================================================  
lvgl_camera_display:
  id: camera_display
  camera_id: tab5_cam
  canvas_id: camera_canvas
  update_interval: 33ms    # LDO du PHY MIPI-DSI (P4)
color:

  - id: color_sky_blue
    hex: 3FA7F3
  - id: color_slate_blue_gray
    hex: 343645
  - id: color_steel_blue
    hex: 606682
  - id: color_misty_blue
    hex: 9BA2BC
  - id: color_black
    hex: 0d0d0d
  - id: color_dark_gray
    hex: 333333
  - id: color_gray
    hex: 666666
  - id: color_light_gray
    hex: 999999
  - id: color_white
    hex: f2f0eb

font:

  - file: {type: gfonts, family: "${font_family}", weight: 300}
    id: f_18
    size: 18
    glyphsets: ["${font_glyphsets}"]
  - file: {type: gfonts, family: "${font_family}", weight: 600}
    id: f_24
    size: 24
    glyphsets: ["${font_glyphsets}"]
  - file: {type: gfonts, family: "${font_family}", weight: 700}
    id: f_30
    size: 30
    glyphsets: ["${font_glyphsets}"]  
  
switch:
  - platform: gpio
    id: wifi_power
    name: "WiFi Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 0
    restore_mode: ALWAYS_ON

  - platform: gpio
    id: usb_5v_power
    name: "USB Power"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 3

  - platform: gpio
    id: quick_charge
    name: "Quick Charge"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 5
      inverted: true

  - platform: gpio
    id: charge_enable
    name: "Charge Enable"
    pin:
      pi4ioe5v6408: pi4ioe2
      number: 7

  - platform: gpio
    id: wifi_antenna_int_ext
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 0

  - platform: gpio
    id: speaker_enable
    name: "Speaker Enable"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 1
    restore_mode: ALWAYS_ON
    inverted: False



  - platform: gpio
    id: external_5v_power
    name: "External 5V Power"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 2
 
  - platform: template
    name: "Aperçu caméra locale"
    id: lvgl_display_enable_switch
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      - lambda: 'id(camera_display).set_enabled(true);'
    turn_off_action:
      - lambda: 'id(camera_display).set_enabled(false);'
  #- platform: gpio
    #id: interrupt_pin_toushsreen
    #name: "interrupt_pin_toushscreen"
    #pin:
      #inverted: true
      #number: GPIO23
    #restore_mode: ALWAYS_ON  


  - platform: gpio
    id: cam_rst
    name: "Camera Reset"
    pin:
      pi4ioe5v6408: pi4ioe1
      number: 6
    restore_mode: ALWAYS_ON
    on_turn_on:
      - delay: 100ms
      - logger.log: "Camera reset activated"  
  #- platform: ip_camera_viewer
    #id: cam
    #camera_id: security_cam_1
    #restore_mode: ALWAYS_OFF      # PAS ALWAYS_ON  

pi4ioe5v6408:
  - id: pi4ioe1
    address: 0x43
    # 0: O - wifi_antenna_int_ext
    # 1: O - speaker_enable
    # 2: O - external_5v_power
    # 3: NC
    # 4: O - lcd reset
    # 5: O - touch panel reset
    # 6: O - camera reset
    # 7: I - headphone detect
  - id: pi4ioe2
    address: 0x44
    # 0: O - wifi_power
    # 1: NC
    # 2: NC
    # 3: O - usb_5v_power
    # 4: O - poweroff pulse
    # 5: O - quick charge enable (inverted)
    # 6: I - charging status
    # 7: O - charge enable

psram:
  mode: hex
  speed: 200MHz

output:
  - platform: ledc
    pin: GPIO22
    id: backlight_pwm
    frequency: 1000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    id: backlight
    name: "Backlight"
    restore_mode: RESTORE_DEFAULT_ON

#touchscreen:
  #- platform: gt911
    #reset_pin:
      #pi4ioe5v6408: pi4ioe1
      #number: 5
    #calibration:
      #x_min: 0
      #y_max: 720
      #y_min: 0
      #x_max: 1280
    #id: touch_screen
    #on_touch:
touchscreen:
  - platform: gt911
    id: touch_screen
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_touch:      
      - lambda: |-
          ESP_LOGD("touchscreen", "Touch detected at (%d, %d)", touch.x, touch.y);      

      - light.turn_on: backlight          
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false


display:
  - platform: mipi_dsi
    dimensions:
      height: 1280
      width: 720
    model: M5Stack-Tab5
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 4
    pixel_mode: 24      
    #color_order: rgb
    #rotation: 0          # ← PAS de rotation driver : on teste LVGL/PPA

# --- Image asymétrique (flèche) pour VOIR le sens de rotation ---
image:
  - file: "images/slider_indicator.png"
    id: arrow
    resize: 220x220
    type: RGB565

  - file: https://raw.githubusercontent.com/youkorr/lvgl_9.5/claude/jolly-lamport-ERZOC/tests/assets/ppa_rot_test.png
    id: arrow2
    resize: 240x240
    type: RGB565
  - file: "images/animated.webp"
    id: animatedweb
    type: RGB565
    resize: 1024x600


  - file: https://raw.githubusercontent.com/youkorr/lvgl_9.5/claude/jolly-lamport-ERZOC/tests/assets/ppa_rot_test_240x120.png
    id: arrow3
    type: RGB565
    
globals:
  - id: step
    type: int
    initial_value: '0'    

# --- LVGL avec rotation PPA ---
lvgl:
  #full_refresh: true
  use_ppa: true
  use_ppa_img: true
  color_depth: 16
  #buffer_size: 100%
  byte_order: little_endian
  fps_benchmark: true
  perf_monitor: true
  rotation: 270     # ← LA rotation à tester (PPA HW)
  pages:
    - id: call_page
      bg_color: ${col_bg}
      on_load:
        - lambda: |-
            // Relier les deux canvas à leur composant (une fois les widgets créés)
            id(camera_display).configure_canvas(id(camera_canvas));
            id(rtc).set_remote_canvas(id(remote_canvas));
      widgets:
        # ---------- Barre de titre ----------
        - obj:
            x: 0
            y: 0
            width: 1024
            height: 52
            bg_color: ${col_panel}
            bg_opa: COVER
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  x: 16
                  y: 12
                  text: "Visio ESP32-P4"
                  text_color: ${col_text}
                  text_font: f_24
              - label:
                  id: call_status
                  align: RIGHT_MID
                  x: -16
                  text: "● En attente"
                  text_color: ${col_text2}
                  text_font: f_18

        # ---------- Vidéo du correspondant (canvas 640x480) ----------
        - canvas:
            id: remote_canvas
            x: 16
            y: 64
            width: 640
            height: 480
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 2
            border_color: ${col_panel}
            radius: 8
            pad_all: 0
        - label:
            id: remote_hint
            x: 120
            y: 290
            text: "En attente du correspondant…"
            text_color: ${col_text2}
            text_font: f_24

        # ---------- Panneau de droite ----------
        # Bouton Appeler (vert)
        - button:
            id: btn_call
            x: 680
            y: 72
            width: 328
            height: 92
            bg_color: ${col_green}
            bg_opa: COVER
            radius: 14
            on_click:
              - webrtc.start: rtc
              - switch.turn_on: lvgl_display_enable_switch
              - lvgl.label.update:
                  id: call_status
                  text: "● Appel en cours…"
                  text_color: ${col_amber}
            widgets:
              - label:
                  align: CENTER
                  text: "Appeler"
                  text_color: 0xFFFFFF
                  text_font: f_30

        # Bouton Raccrocher (rouge)
        - button:
            id: btn_hangup
            x: 680
            y: 176
            width: 328
            height: 92
            bg_color: ${col_red}
            bg_opa: COVER
            radius: 14
            on_click:
              - webrtc.stop: rtc
              - switch.turn_off: lvgl_display_enable_switch
              - lvgl.label.update:
                  id: call_status
                  text: "● En attente"
                  text_color: ${col_text2}
              - lvgl.widget.show: remote_hint
            widgets:
              - label:
                  align: CENTER
                  text: "Raccrocher"
                  text_color: 0xFFFFFF
                  text_font: f_30

        # Etiquette "Vous"
        - label:
            x: 680
            y: 292
            text: "Vous"
            text_color: ${col_text2}
            text_font: f_18

        # Auto-aperçu (caméra locale) — médaillon 328x246
        - canvas:
            id: camera_canvas
            x: 680
            y: 316
            width: 328
            height: 246
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 2
            border_color: ${col_panel}
            radius: 8
            pad_all: 0

        # Salle
        - label:
            align: BOTTOM_LEFT
            x: 20
            y: -12
            text: "Salle : ${room}"
            text_color: ${col_text2}
            text_font: f_18      


            


            