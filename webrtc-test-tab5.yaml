      ref: 44815290647b9fd1c760dd82737eac209ba98714
    components: [h264_hp]
    refresh: 0s 

# ⚠️ h264_hp et MJPEG sont INCOMPATIBLES — choisis selon video_codec :
#   video_codec: mjpeg -> h264_hp COMMENTÉ (obligatoire)
#   video_codec: h264  -> h264_hp: décommenté (obligatoire pour décoder)
# Pourquoi : h264_hp active CONFIG_SPIRAM_USE_MALLOC (requis par edge264), ce
# qui étiquette la PSRAM en mémoire "DEFAULT". Le driver JPEG matériel alloue
# ses structures DMA2D (dont le callback on_job_picked) en MALLOC_CAP_DEFAULT
# (jpeg_private.h, IDF 5.5.4) : elles peuvent alors tomber en PSRAM et être
# corrompues par le DMA caméra -> crash "Instruction access fault" au 1er frame.
# En MJPEG le décodage est fait par le JPEG matériel : edge264 est inutile.
# h264_hp:

## ===========================================================================
##  WEBRTC — P4 <-> P4 (MJPEG vidéo matérielle + Opus audio, 1280x720)
##  Mets le MÊME room_id sur les deux P4 (voir substitutions.room en haut).
## ===========================================================================
webrtc:
  id: rtc
  room_id: "${room}"
  role: caller                # Tab5 = celui qui APPELLE (offerer fixe).
                              # Le Waveshare doit être en role: callee.
                              # Ainsi le rôle ne dépend plus de l'ordre de
                              # démarrage ni d'un client fantôme dans la room.
  # Signaling auto-hébergé (voir signaling-server/). Décommente pour ne plus
  # dépendre de webrtc.espressif.com. MÊME url + token sur les deux P4.
  # signaling_url: "http://192.168.1.12:8080"
  # signaling_token: "change-moi-secret-partage"
  video_codec: mjpeg          # MJPEG : capture -> PPA (taille exacte) -> JPEG matériel
                              # -> data channel, sur la boucle principale.
                              # Alternative validée : h264 (encodeur HW + edge264).
  audio_codec: opus           # 16 kHz large bande (P4<->P4)
  video_direction: sendrecv   # envoie ET reçoit la vidéo
  audio_direction: sendrecv   # envoie ET reçoit l'audio
  enable_data_channel: true   # ESSENTIEL : la vidéo MJPEG transite par le data channel
  camera_id: tab5_cam
  speaker_id: tab5_speaker
  microphone_id: tab5_microphone
  sample_rate: 16000
  video_width: 640            # taille EXACTE envoyée (le PPA redimensionne la caméra
  video_height: 480           # vers ça, quelle que soit sa résolution native ; mult. de 16)
  fps: 10                     # 640x480 : garde 10 fps pour ne pas saturer le data channel
  jpeg_quality: 25            # qualité MJPEG : + bas = frames + petites. À 640x480 il faut
                              # viser ~11 Ko/frame (le plafond du lien ESP-Hosted C6 avec
                              # l'audio) : 25 ≈ 10-12 Ko. Si les logs affichent « > 13000 B
                              # cap; dropped » (pas d'image), baisse encore (20, 18...).
                              # Plus simple/net : baisse plutôt la résolution (480x352,
                              # 400x400) et remonte la qualité — voir note plus bas.
  auto_start: false
  ice_servers:
    - url: "stun:stun.l.google.com:19302"
    # TON coturn (Unraid, br0, IP LAN 192.168.1.12). Voir coturn/turnserver.conf.
    # LAN pour ce test. Pour le maison-à-maison, remplace 192.168.1.12 par ton
    # IP PUBLIQUE (86.206.231.111) une fois la Livebox configurée (redirections).
    - url: "turn:192.168.1.12:3478"
      username: "esp32"
      password: "esp32pass"
  on_paired:
    - lvgl.label.update:
        id: call_status
        text: "● Appairé…"
        text_color: ${col_amber}
  on_connected:
    - lvgl.label.update:
        id: call_status
        text: "● Connecté"
        text_color: ${col_green}
    - lvgl.widget.hide: remote_hint
  on_disconnected:
    - lvgl.label.update:
        id: call_status
        text: "● Terminé"
        text_color: ${col_text2}
    - lvgl.widget.show: remote_hint
  on_connect_failed:
    - lvgl.label.update:
        id: call_status
        text: "● Échec connexion"
        text_color: ${col_red}
    - lvgl.widget.show: remote_hint  
# --- Bring-up écran Tab5 ---
i2c:
  - id: bsp_bus
    sda: GPIO31
    scl: GPIO32
    frequency: 400kHz

esp_ldo:
  - voltage: 2.5V
    channel: 3   
# Boutons Home Assistant (doublon pratique des boutons à l'écran)
button:
  - platform: template
    name: "Appeler"
    on_press:
      - webrtc.start: rtc
  - platform: template
    name: "Raccrocher"
    on_press:
      - webrtc.stop: rtc
# ============================================================================
# AUDIO FULL-DUPLEX — notre composant fdaudio (Espressif natif)
# ============================================================================
fdaudio:
  id: audio_engine
  lrclk_pin: GPIO29
  bclk_pin: GPIO27
  mclk_pin: GPIO30
  din_pin: GPIO28
  dout_pin: GPIO26
  i2c_port: 0
  output_codec: es8388
  output_address: 0x10
  mic_address: 0x40
  mic_gain_db: 37.5
  output_volume: 70
  sample_rate: 16000
  enable_aec: true            # AEC -> micro nettoyé (rend le barge-in fiable)

microphone:
  - platform: fdaudio
    id: tab5_microphone
    fdaudio_id: audio_engine

speaker:
  - platform: fdaudio
    id: tab5_speaker
    fdaudio_id: audio_engine

audio_dac:
  - platform: es8388
    id: es8388_dac

media_player:
  - platform: speaker
    name: "Habbit Desk PRO"
    id: speaker_player
    announcement_pipeline:
      speaker: tab5_speaker
      format: FLAC
      sample_rate: 48000
      num_channels: 1    
# ============================================================================
# ESP-Video Core (M5Stack Tab5 style)
# ============================================================================  
esp_video:
  i2c_id: bsp_bus
  xclk_pin: GPIO36
  xclk_freq: 24000000
  enable_jpeg: true
  enable_isp: true
  use_heap_allocator: false

# ============================================================================
# Caméra MIPI-CSI 
# ============================================================================



esp_cam_sensor:
  id: tab5_cam
  i2c_id: bsp_bus
  sensor_type: sc2356        #"sensor_type" au lieu de "sensor"
  resolution: "1280x720"           # , 1024x600 ,"800x600" 
  pixel_format: "RGB565"      # Zero-copy 
  framerate: 30
  jpeg_quality: 15
  mirror_x: false    # Flip horizontal (hardware) - laisse false (voir ppa_enabled)
  mirror_y: false    # Flip vertical - laisse false (voir ppa_enabled)
  rotation: 0         # 0/90/180/270° - laisse 0 (voir ppa_enabled)
  crop_offset_x: 0   # Crop pixels from left - laisse 0 (voir ppa_enabled)
  # OBLIGATOIRE en visio MJPEG sendrecv: la caméra NE DOIT PAS utiliser le PPA.
  # Sur le P4 le PPA et le codec JPEG matériel partagent le moteur DMA; si la
  # caméra fait un PPA à chaque capture ALORS que le webrtc encode (TX) ET decode
  # (RX) sur le codec JPEG, le relais encodeur<->decodeur fige la boucle
  # principale (task_wdt, 1 encode + 1 decode puis mort). ppa_enabled: false ->
  # une seule famille de clients sur le codec. ATTENTION: mirror/rotation/crop
  # ci-dessus RÉACTIVENT le PPA même avec false -> garde-les à 0/false.
  ppa_enabled: false

      
# UN SEUL canvas par P4 (le correspondant). On N'AFFICHE PAS l'auto-aperçu local
# (lvgl_camera_display retiré) : deux pipelines vidéo sur un P4 = trop lourd. La
# caméra tourne quand même pour l'ENVOI (le composant webrtc la démarre lui-même).
