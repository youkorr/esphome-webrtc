  flash_size: 16MB
  engineering_sample: true
  framework:
    type: esp-idf


    advanced:
      enable_idf_experimental_features: yes
    sdkconfig_options:
      CONFIG_ESP_HOSTED_MEMPOOL_PREFER_SPIRAM: "y"
      CONFIG_ESP_TASK_WDT_EN: "10"
      
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "n"
      CONFIG_SPIRAM_RODATA: "n"
      CONFIG_ESP32_SPIRAM_SUPPORT: "y"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_FATFS_LFN_STACK: "y"
      #CONFIG_LWIP_SO_RCVBUF: "y"
      CONFIG_LWIP_MAX_SOCKETS: "16"
      CONFIG_VFS_SUPPORT_IO: "y"
      CONFIG_VFS_MAX_COUNT: "16" 
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"
      CONFIG_ESP_TIMER_TASK_STACK_SIZE: "4096"
      #CONFIG_ESP_TASK_WDT_TIMEOUT_S: "60"
      CONFIG_ESP_TASK_LOOP_STACK_SIZE: "16384"
      CONFIG_FATFS_LFN_HEAP: "y"
      DCONFIG_USE_AUDIO_AAC_SUPPORT: "y"
      DCONFIG_ESP_JPG_DECODE_ENABLE: "y"
      DCONFIG_ESPHOME_ENABLE_PNGLE: "1"
      CONFIG_SPIRAM_SPEED_200M: "y"  # ← NOUVEAU: 200 MHz au lieu de défaut
      CONFIG_SPIRAM_SPEED: "200"
      # Buffers WiFi distant (C6) + agrégation AMPDU = gros gain d'efficacité
      CONFIG_WIFI_RMT_STATIC_RX_BUFFER_NUM: "16"
      CONFIG_WIFI_RMT_DYNAMIC_RX_BUFFER_NUM: "64"
      CONFIG_WIFI_RMT_DYNAMIC_TX_BUFFER_NUM: "64"
      CONFIG_WIFI_RMT_AMPDU_TX_ENABLED: "y"
      CONFIG_WIFI_RMT_TX_BA_WIN: "32"
      CONFIG_WIFI_RMT_AMPDU_RX_ENABLED: "y"
      CONFIG_WIFI_RMT_RX_BA_WIN: "32"
      # Buffers lwIP (UDP surtout pour toi)
      CONFIG_LWIP_UDP_RECVMBOX_SIZE: "64"
      CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "64"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "64"
      CONFIG_LWIP_TCP_SND_BUF_DEFAULT: "65534"
      CONFIG_LWIP_TCP_WND_DEFAULT: "65534"
      CONFIG_LWIP_TCP_SACK_OUT: "y"  

      # 2) Cache L2 au maximum — couvre bien mieux les buffers de frame en PSRAM

      #CONFIG_CACHE_L2_CACHE_LINE_128B: "y"
      #CONFIG_CACHE_L2_CACHE_256KB: "y"



