# --- LVGL avec rotation PPA ---
lvgl:
  #full_refresh: true
  use_ppa: true
  use_ppa_img: true
  color_depth: 16
  #buffer_size: 100%
  byte_order: little_endian
  fps_benchmark: true
  perf_monitor: true
  rotation: 270     # ← LA rotation à tester (PPA HW)
  pages:
    - id: call_page
      bg_color: ${col_bg}
      on_load:
        - lambda: |-
            // Un seul canvas : celui du correspondant.
            id(rtc).set_remote_canvas(id(remote_canvas));
      widgets:
        # ---------- Vidéo du correspondant ----------
        # Le canvas fait la TAILLE DE LA VIDÉO (640x480) et est centré. IMPORTANT :
        # width/height doivent = video_width/video_height du bloc webrtc, sinon
        # l'image est rognée ou décalée (le décodeur pose un buffer à la taille
        # décodée, il n'y a pas de mise à l'échelle).
        - canvas:
            id: remote_canvas
            align: CENTER
            width: 640
            height: 480
            bg_color: 0x000000
            bg_opa: COVER
            border_width: 2
            border_color: ${col_panel}
            radius: 8
            pad_all: 0
        # Message d'attente (par-dessus le canvas, masqué à la connexion)
        - label:
            id: remote_hint
            align: CENTER
            text: "En attente du correspondant…"
            text_color: ${col_text2}
            text_font: f_24

        # ---------- Barre de statut (superposée, haut) ----------
        - obj:
            align: TOP_MID
            x: 0
            y: 0
            width: 1280
            height: 56
            bg_color: ${col_panel}
            bg_opa: 70%
            border_width: 0
            radius: 0
            pad_all: 0
            widgets:
              - label:
                  align: LEFT_MID
                  x: 16
                  text: "Visio ESP32-P4  ·  Salle ${room}"
                  text_color: ${col_text}
                  text_font: f_24
              - label:
                  id: call_status
                  align: RIGHT_MID
                  x: -16
                  text: "● En attente"
                  text_color: ${col_text2}
                  text_font: f_18

        # ---------- Boutons superposés (bas) ----------
        - button:
            id: btn_call
            align: BOTTOM_MID
            x: -140
            y: -24
            width: 250
            height: 84
            bg_color: ${col_green}
            bg_opa: COVER
            radius: 14
            on_click:
              - webrtc.start: rtc
              - lvgl.label.update:
                  id: call_status
                  text: "● Appel en cours…"
                  text_color: ${col_amber}
            widgets:
              - label:
                  align: CENTER
                  text: "Appeler"
                  text_color: 0xFFFFFF
                  text_font: f_30
        - button:
            id: btn_hangup
            align: BOTTOM_MID
            x: 140
            y: -24
            width: 250
            height: 84
            bg_color: ${col_red}
            bg_opa: COVER
            radius: 14
            on_click:
              - webrtc.stop: rtc
              - lvgl.label.update:
                  id: call_status
                  text: "● En attente"
                  text_color: ${col_text2}
              - lvgl.widget.show: remote_hint
            widgets:
              - label:
                  align: CENTER
                  text: "Raccrocher"
                  text_color: 0xFFFFFF
                  text_font: f_30


            


            