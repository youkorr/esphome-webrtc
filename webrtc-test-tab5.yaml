#touchscreen:
  #- platform: gt911
    #reset_pin:
      #pi4ioe5v6408: pi4ioe1
      #number: 5
    #calibration:
      #x_min: 0
      #y_max: 720
      #y_min: 0
      #x_max: 1280
    #id: touch_screen
    #on_touch:
touchscreen:
  - platform: gt911
    id: touch_screen
    interrupt_pin: GPIO23
    update_interval: never
    reset_pin:
      pi4ioe5v6408: pi4ioe1
      number: 5
    calibration:
      x_min: 0
      x_max: 720
      y_min: 0
      y_max: 1280
    on_touch:      
      - lambda: |-
          ESP_LOGD("touchscreen", "Touch detected at (%d, %d)", touch.x, touch.y);      

      - light.turn_on: backlight          
    transform:
      swap_xy: false
      mirror_x: false
      mirror_y: false


